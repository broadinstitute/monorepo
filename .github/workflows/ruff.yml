name: Ruff

on:
  push:
    paths:
      - 'libs/jump_rr/**'
      - 'libs/jump_portrait/**'
      - '.github/workflows/ruff.yml'
  pull_request:
    paths:
      - 'libs/jump_rr/**'
      - 'libs/jump_portrait/**'
      - '.github/workflows/ruff.yml'

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        library: [jump_rr, jump_portrait]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Run Ruff Check (Lint)
        working-directory: libs/${{ matrix.library }}
        run: ruff check .
        
      - name: Run Ruff Format
        working-directory: libs/${{ matrix.library }}
        run: ruff format --check .
